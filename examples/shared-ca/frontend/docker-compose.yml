# Frontend app — uses the shared Kalypso CA for HTTPS.
#
# Prereqs:
#   1. Start the shared Kalypso:  cd ../  &&  docker compose up -d
#   2. Trust the CA once (see ../docker-compose.yml)
#   3. Add to /etc/hosts:  127.0.0.1 frontend.local
#
# Usage:
#   docker compose up -d
#   # Visit https://frontend.local

services:
  # Sidecar fetches certs from the shared Kalypso
  certs:
    build: ../../..
    # image: kalypso/kalypso:latest
    command: ["sidecar"]
    environment:
      KALYPSO_DOMAINS: "frontend.local,*.frontend.local"
      KALYPSO_SERVER: "http://kalypso:8200"
    volumes:
      - certs:/certs
    networks:
      - kalypso

  web:
    image: nginx:alpine
    depends_on:
      certs:
        condition: service_started
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  certs:

networks:
  kalypso:
    external: true
