# Frontend app — uses the shared Kalypso CA for HTTPS.
#
# Prereqs:
#   1. Start the shared Kalypso:  cd ../  &&  docker compose up -d
#   2. Trust the CA once (see ../docker-compose.yml)
#   3. Add to /etc/hosts:  127.0.0.1 frontend.local
#
# Usage:
#   docker compose up -d
#   # Visit https://frontend.local
#
# No sidecar needed! Kalypso watches the Docker socket and auto-discovers
# any container with `kalypso.domains` labels, across all Compose stacks.

services:
  web:
    image: nginx:alpine
    labels:
      kalypso.domains: "frontend.local,*.frontend.local"
      kalypso.cert_dir: "frontend"
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ${KALYPSO_CERTS_DIR:-~/.kalypso/certs}/frontend:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
