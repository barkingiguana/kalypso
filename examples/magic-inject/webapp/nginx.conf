server {
    listen 80;
    server_name myapp.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name myapp.local;

    # These paths come from Kalypso's nginx image profile —
    # certs are injected directly by Kalypso, no volume mount needed.
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        return 200 '<!DOCTYPE html><html><body><h1>Hello from Kalypso! Zero-config HTTPS.</h1></body></html>';
        add_header Content-Type text/html;
    }
}
