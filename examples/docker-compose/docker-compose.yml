# Kalypso + nginx with automatic HTTPS.
#
# Usage:
#   docker compose up -d
#
#   # Trust the CA cert on your host (one time):
#   curl -s http://localhost:8200/ca.pem > /tmp/kalypso-ca.pem
#   sudo kalypso trust  # or: sudo security add-trusted-cert ... (macOS)
#
#   # Add to /etc/hosts:
#   127.0.0.1 myapp.local
#
#   # Visit https://myapp.local — it just works.

services:
  # 1. The CA server — issues and manages certificates
  kalypso:
    build: ../..
    # image: kalypso/kalypso:latest
    volumes:
      - kalypso-data:/data
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. The sidecar — auto-issues certs and writes them to a shared volume
  certs:
    build: ../..
    # image: kalypso/kalypso:latest
    command: ["sidecar"]
    depends_on:
      kalypso:
        condition: service_healthy
    environment:
      KALYPSO_DOMAINS: "myapp.local,*.myapp.local"
      KALYPSO_SERVER: "http://kalypso:8200"
    volumes:
      - certs:/certs

  # 3. Your web server — just mount the certs volume, done
  web:
    image: nginx:alpine
    depends_on:
      certs:
        condition: service_started
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  kalypso-data:
  certs:
