# Kalypso + nginx with auto-renewing HTTPS and graceful reload.
#
# Certs are re-issued at 50% lifetime (every 12h with 24h certs).
# nginx reloads gracefully on every renewal — zero downtime.
#
# Usage:
#   docker compose up -d
#
#   # Trust the CA cert on your host (one time):
#   curl http://localhost:8200/ca.pem > /tmp/kalypso-ca.pem && sudo kalypso trust
#
#   # Add to /etc/hosts: 127.0.0.1 myapp.local
#   # Visit https://myapp.local

services:
  kalypso:
    build: ../../..
    # image: kalypso/kalypso:latest
    volumes:
      - kalypso-data:/data
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Auto-issues certs AND reloads nginx gracefully on renewal
  certs:
    build: ../../..
    # image: kalypso/kalypso:latest
    command: ["sidecar"]
    depends_on:
      kalypso:
        condition: service_healthy
    environment:
      KALYPSO_DOMAINS: "myapp.local,*.myapp.local"
      KALYPSO_SERVER: "http://kalypso:8200"
      KALYPSO_HOURS: "24"
    volumes:
      - certs:/certs

  web:
    image: nginx:alpine
    depends_on:
      certs:
        condition: service_started
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # nginx picks up new certs on worker restart — graceful reload
    # Use this to manually reload: docker compose exec web nginx -s reload
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  kalypso-data:
  certs:
